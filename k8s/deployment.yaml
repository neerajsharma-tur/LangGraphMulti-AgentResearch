apiVersion: apps/v1
kind: Deployment
metadata:
  name: langraph-agent
  labels:
    app: langraph-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: langraph-agent
  template:
    metadata:
      labels:
        app: langraph-agent
    spec:
      containers:
      - name: langraph-agent
        image: us-central1-docker.pkg.dev/delivery-humain-marketplace/humain-containers/langraph-agent:latest
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - secretRef:
            name: langraph-agent-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
