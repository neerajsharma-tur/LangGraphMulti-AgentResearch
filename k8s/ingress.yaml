apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langraph-agent
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.allow-http: "true"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: langraph-agent
            port:
              number: 80
